global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "streampulse"

scrape_configs:
  # ── Gateway metrics (prom-client) ────────────────────────────
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:4000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # ── Drop prediction service ──────────────────────────────────
  - job_name: "ml-drop"
    static_configs:
      - targets: ["ml-drop:8001"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ── Sentiment service ────────────────────────────────────────
  - job_name: "ml-sentiment"
    static_configs:
      - targets: ["ml-sentiment:8002"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ── Prometheus self-monitoring ───────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
