services:
  - type: web
    name: streampulse-gateway
    runtime: node
    rootDir: gateway
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      # Set these manually in Render dashboard (sensitive values):
      # DATABASE_URL, REDIS_URL, JWT_SECRET,
      # ML_DROP_URL, ML_SENTIMENT_URL, CORS_ORIGIN
    healthCheckPath: /health
    autoDeploy: true
